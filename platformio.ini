[platformio]
default_envs = safe_idle

[uno]
platform = atmelavr@5.2.0
board = uno
framework = arduino
monitor_speed = 115200
lib_deps =
    arduino-libraries/Servo@1.3.0
build_flags =
    -std=gnu++11
    -Isrc
    -mcall-prologues

[env:safe_idle]
extends = uno
build_flags =
    ${uno.build_flags}
    -DROBOT_BACKEND_NONE=1
    -DROBOT_SAFE_IDLE=1
    -DROBOT_ARM_CALIBRATION=0

[env:uart_closed_loop_qualification]
extends = uno
build_flags =
    ${uno.build_flags}
    -DROBOT_BACKEND_UART=1
    -DROBOT_UART_CLOSED_LOOP=1
    -DROBOT_DRIVE_QUALIFICATION=1
    -DROBOT_DRIVE_CALIBRATION_QUALIFIED=0
    -DROBOT_ARM_CALIBRATION=0

[env:uart_closed_loop_robot]
extends = uno
build_flags =
    ${uno.build_flags}
    -DROBOT_BACKEND_UART=1
    -DROBOT_UART_CLOSED_LOOP=1
    -DROBOT_DRIVE_QUALIFICATION=0
    -DROBOT_DRIVE_CALIBRATION_QUALIFIED=0
    -DROBOT_ARM_CALIBRATION=0

[env:uart_closed_loop_qualification_9600]
extends = env:uart_closed_loop_qualification
build_flags =
    ${env:uart_closed_loop_qualification.build_flags}
    -DROBOT_HOST_BAUD=9600UL

[env:uart_closed_loop_robot_9600]
extends = env:uart_closed_loop_robot
build_flags =
    ${env:uart_closed_loop_robot.build_flags}
    -DROBOT_HOST_BAUD=9600UL

[env:uart_open_loop_calibration]
extends = uno
build_flags =
    ${uno.build_flags}
    -DROBOT_BACKEND_UART=1
    -DROBOT_UART_OPEN_LOOP=1
    -DROBOT_DRIVE_QUALIFICATION=1
    -DROBOT_DRIVE_CALIBRATION_QUALIFIED=0
    -DROBOT_ARM_CALIBRATION=0

[env:arm_calibration]
extends = uno
build_flags =
    ${uno.build_flags}
    -DROBOT_BACKEND_NONE=1
    -DROBOT_SAFE_IDLE=0
    -DROBOT_ARM_CALIBRATION=1

[env:native]
platform = native
test_framework = unity
test_build_src = true
build_src_filter =
    +<domain/>
    +<core/Scheduler.cpp>
    +<core/MotorBoardProtocol.cpp>
    +<subsystems/ChassisSubsystem.cpp>
    +<subsystems/SafetySupervisor.cpp>
build_flags =
    -std=gnu++11
    -Isrc
    -DROBOT_BACKEND_NONE=1
    -DROBOT_SAFE_IDLE=1
    -DROBOT_ARM_CALIBRATION=0
    -DROBOT_DRIVE_CALIBRATION_QUALIFIED=0
