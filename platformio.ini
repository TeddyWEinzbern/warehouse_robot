[platformio]
default_envs = calibration

[uno]
platform = atmelavr@5.2.0
board = uno
framework = arduino
monitor_speed = 115200
lib_deps =
    arduino-libraries/Servo@1.3.0
build_flags =
    -std=gnu++11
    -Isrc
    -mcall-prologues
; HC-05 normal data-mode baud must match the host. Uncomment for 9600 baud:
;    -DROBOT_HOST_BAUD=9600UL

; Production closed-loop drive. Flip the two *_CALIBRATED flags to 1 after
; finishing the matching chapters of docs/calibration.md; the firmware
; refuses to ARM until ROBOT_DRIVE_CALIBRATED=1.
[env:robot_closed_loop]
extends = uno
build_flags =
    ${uno.build_flags}
    -DROBOT_BACKEND_UART=1
    -DROBOT_UART_CLOSED_LOOP=1
    -DROBOT_ARM_CALIBRATED=0
    -DROBOT_DRIVE_CALIBRATED=0

; Open-loop fallback (no encoder speed control; commands map to PWM percent).
[env:robot_open_loop]
extends = uno
build_flags =
    ${uno.build_flags}
    -DROBOT_BACKEND_UART=1
    -DROBOT_UART_OPEN_LOOP=1
    -DROBOT_ARM_CALIBRATED=0
    -DROBOT_DRIVE_CALIBRATED=0

; Combined servo + motor calibration image driven by the interactive
; `warehouse-robot calibrate` session over the A4/A5 host link (HC-05 or
; USB-TTL adapter). See docs/calibration.md.
[env:calibration]
extends = uno
build_flags =
    ${uno.build_flags}
    -DROBOT_BACKEND_UART=1
    -DROBOT_UART_CLOSED_LOOP=1
    -DROBOT_CALIBRATION=1

[env:native]
platform = native
test_framework = unity
test_build_src = true
build_src_filter =
    +<domain/>
    +<core/Scheduler.cpp>
    +<core/MotorBoardProtocol.cpp>
    +<subsystems/ChassisSubsystem.cpp>
    +<subsystems/SafetySupervisor.cpp>
build_flags =
    -std=gnu++11
    -Isrc
    -DROBOT_BACKEND_NONE=1
