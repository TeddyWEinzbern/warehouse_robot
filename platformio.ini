[platformio]
default_envs = l293d_dev

[uno]
platform = atmelavr
board = uno
framework = arduino
monitor_speed = 115200
lib_deps =
    arduino-libraries/Servo@^1.2.2
build_flags =
    -std=gnu++11
    -Isrc

[env:l293d_dev]
extends = uno
build_flags =
    ${uno.build_flags}
    -DROBOT_BACKEND_L293D=1
    -DROBOT_ARM_CALIBRATION=0

[env:uart_encoder_robot]
extends = uno
build_flags =
    ${uno.build_flags}
    -DROBOT_BACKEND_UART=1
    -DROBOT_ARM_CALIBRATION=0

[env:arm_calibration]
extends = uno
build_flags =
    ${uno.build_flags}
    -DROBOT_BACKEND_NONE=1
    -DROBOT_ARM_CALIBRATION=1

[env:native]
platform = native
test_framework = unity
test_build_src = true
build_src_filter =
    +<domain/>
    +<subsystems/SafetySupervisor.cpp>
build_flags =
    -std=gnu++11
    -Isrc
    -DROBOT_BACKEND_NONE=1
