[platformio]
default_envs = calibration

[uno]
platform = atmelavr@5.2.0
board = uno
framework = arduino
lib_deps =
    arduino-libraries/Servo@1.3.0
    SlashDevin/NeoSWSerial@3.0.5
build_flags =
    -std=gnu++11
    -Isrc
    -mcall-prologues
    -fstack-usage

; Production image for the HC-06 link. The default host baud is 9600.
; Add -DROBOT_HOST_BAUD=38400UL only after configuring the module to match.
; Change ROBOT_DRIVER_CONTROL_CLOSE to ROBOT_DRIVER_CONTROL_OPEN when the
; motor board must run its open-loop PWM interface.
[env:robot]
extends = uno
build_flags =
    ${uno.build_flags}
    -DROBOT_DRIVER_ENABLED=1
    -DROBOT_DRIVER_CONTROL_CLOSE=1
    -DROBOT_DRIVE_ENABLED=1
    -DROBOT_ARM_ENABLED=1
    -DROBOT_ARM_CALIBRATED=0
    -DROBOT_DRIVE_CALIBRATED=0

; Calibration services are compiled once and expose only the features enabled
; below. They remain DISARMED and use explicit, on-demand request/reply frames.
[env:calibration]
extends = uno
build_flags =
    ${uno.build_flags}
    -DROBOT_DRIVER_ENABLED=1
    -DROBOT_DRIVER_CONTROL_CLOSE=1
    -DROBOT_DRIVE_ENABLED=1
    -DROBOT_ARM_ENABLED=1
    -DROBOT_SENSOR_ENABLED=1
    -DROBOT_CALIBRATION=1

[env:native]
platform = native
test_framework = unity
test_build_src = true
build_src_filter =
    +<domain/>
    +<core/Scheduler.cpp>
    +<core/MotorBoardProtocol.cpp>
    +<subsystems/ChassisSubsystem.cpp>
    +<subsystems/SafetySupervisor.cpp>
build_flags =
    -std=gnu++11
    -Isrc
    -DROBOT_DRIVER_ENABLED=0
    -DROBOT_DRIVE_ENABLED=0
    -DROBOT_ARM_ENABLED=0
