[platformio]
; CI-only compile gates. The normal project still exposes only robot,
; calibration, and native. Base toolchain/library settings come from the
; authoritative project file instead of being duplicated here.
extra_configs = platformio.ini

[qualified_robot]
extends = uno
build_flags =
    ${uno.build_flags}
    -DROBOT_DRIVER_ENABLED=1
    -DROBOT_DRIVE_ENABLED=1
    -DROBOT_ARM_ENABLED=1
    -DROBOT_ARM_CALIBRATED=1
    -DROBOT_DRIVE_CALIBRATED=1

[env:ci_robot_qualified]
extends = qualified_robot
build_flags =
    ${qualified_robot.build_flags}
    -DROBOT_DRIVER_CONTROL_CLOSE=1

[env:ci_robot_38400]
extends = qualified_robot
build_flags =
    ${qualified_robot.build_flags}
    -DROBOT_DRIVER_CONTROL_CLOSE=1
    -DROBOT_HOST_BAUD=38400UL

[env:ci_robot_open]
extends = qualified_robot
build_flags =
    ${qualified_robot.build_flags}
    -DROBOT_DRIVER_CONTROL_OPEN=1

[env:ci_robot_arm_only]
extends = uno
build_flags =
    ${uno.build_flags}
    -DROBOT_DRIVER_ENABLED=1
    -DROBOT_DRIVER_CONTROL_CLOSE=1
    -DROBOT_DRIVE_ENABLED=0
    -DROBOT_ARM_ENABLED=1
    -DROBOT_ARM_CALIBRATED=1

[env:ci_robot_sensor]
extends = qualified_robot
build_flags =
    ${qualified_robot.build_flags}
    -DROBOT_DRIVER_CONTROL_CLOSE=1
    -DROBOT_SENSOR_ENABLED=1

[env:ci_calibration_38400]
extends = uno
build_flags =
    ${uno.build_flags}
    -DROBOT_DRIVER_ENABLED=1
    -DROBOT_DRIVER_CONTROL_CLOSE=1
    -DROBOT_DRIVE_ENABLED=1
    -DROBOT_ARM_ENABLED=1
    -DROBOT_SENSOR_ENABLED=1
    -DROBOT_CALIBRATION=1
    -DROBOT_HOST_BAUD=38400UL
